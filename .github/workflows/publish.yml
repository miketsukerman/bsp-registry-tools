name: Publish to PyPI

on:
  release:
    types: [published]           # publish when a GitHub Release is published
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (testpypi or pypi)"
        required: true
        default: "testpypi"
        type: choice
        options: [testpypi, pypi]

# Minimal default permissions; publish jobs elevate id-token only where needed
permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build package (sdist + wheel)
        run: python -m build

      - name: Store distribution packages
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          retention-days: 3

  publish-to-testpypi:
    name: Publish to TestPyPI
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'testpypi') ||
      (github.event_name == 'release' && github.event.action == 'published')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/bsp-registry-tools
    permissions:
      id-token: write    # required for PyPI Trusted Publisher
      contents: read
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          verify-metadata: true
          verbose: true

  publish-to-pypi:
    name: Publish to PyPI
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'pypi') ||
      (github.event_name == 'release' && github.event.action == 'published' && !github.event.release.prerelease)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/bsp-registry-tools
    permissions:
      id-token: write    # required for PyPI Trusted Publisher
      contents: read
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verify-metadata: true