# KAS configuration for Yocto Whinlatter (5.3 LTS)
# https://downloads.yoctoproject.org/releases/yocto/yocto-5.3/RELEASENOTES
header:
  version: 14

defaults:
  repos:
    branch: "whinlatter"

repos:
  bitbake:
    branch: "master"

  openembedded-core:
    layers:
      meta: 

  meta-yocto:
    layers:
      meta-poky: 
      meta-yocto-bsp: 

  poky:
    branch: "master"
    layers:
      meta: "disabled"
      meta-poky: "disabled"
      meta-yocto-bsp: "disabled"
