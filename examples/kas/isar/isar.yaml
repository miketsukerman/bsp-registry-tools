header:
  version: 14

build_system: isar

target:
  - isar-image-base

repos:
  isar:
    url: "https://github.com/ilbers/isar.git"
    path: "layers/isar"
    layers:
      meta:
      meta-isar:
      meta-test:

bblayers_conf_header:
  standard: |
    BBPATH = "${TOPDIR}"
    BBFILES ?= ""

# Default QEMU WKS_FILE for image generation, can be overridden by features
local_conf_header:
  wks-file: |
    # Set the default WKS_FILE to use for image generation
    WKS_FILE = "qemudefault.wks"
