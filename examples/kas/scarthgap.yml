# KAS configuration for Yocto Scarthgap (5.0 LTS)
# https://downloads.yoctoproject.org/releases/yocto/yocto-5.0.11/RELEASENOTES
header:
  version: 14

defaults:
  repos:
    branch: "scarthgap"

repos:
  poky:
    url: "https://git.yoctoproject.org/poky"
    commit: "200d12b6a58ad961d60a7774ca0f7a9d29498724"
    path: "layers/poky"
    layers:
      meta:
      meta-poky:

  meta-openembedded:
    url: "https://github.com/openembedded/meta-openembedded.git"
    commit: "72018ca1b1a471226917e8246e8bbf9a374ccf97"
    path: "layers/meta-openembedded"
    layers:
      meta-oe:
      meta-python:
      meta-networking:

local_conf_header:
  distro: |
    WARN_QA:remove = "license-exists"
