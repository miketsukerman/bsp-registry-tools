specification:
  version: "2.0"

# Global environment variables for all builds (base layer – applied to every build)
# Use $ENV{VAR_NAME} syntax to reference system environment variables
environment:
  - name: "GITCONFIG_FILE"
    value: "$ENV{HOME}/.gitconfig"

# Named environments: each entry bundles a container reference + variables.
# The special name "default" is used for any release that does not specify an environment.
# A release can override by setting its "environment:" field to a different name.
environments:
  default:
    container: debian-bookworm
    variables:
      - name: "DL_DIR"
        value: "$ENV{HOME}/data/cache/downloads"
      - name: "SSTATE_DIR"
        value: "$ENV{HOME}/data/cache/sstate"

  # Isar uses its own Debian-based build system – point to a dedicated container
  isar-build:
    container: isar-debian-trixie
    variables:
      - name: "DL_DIR"
        value: "$ENV{HOME}/data/cache/isar/downloads"
      - name: "SSTATE_DIR"
        value: "$ENV{HOME}/data/cache/isar/sstate"

# Container definitions for build environments
containers:
  - debian-bookworm:
      image: "bsp/registry/debian/kas:5.2"
      file: Dockerfile.poky.debian
      args:
        - name: "DISTRO"
          value: "debian-bookworm"
        - name: "KAS_VERSION"
          value: "5.2"
  - isar-debian-trixie:
      image: "bsp/registry/debian/isar/kas:5.2"
      file: Dockerfile.isar.debian
      privileged: true    # Run container in privileged mode (required for ISAR builds)
      args:
        - name: "DISTRO"
          value: "debian-trixie"
        - name: "KAS_VERSION"
          value: "5.2"

registry:

  # =====================================
  # Devices
  # =====================================

  devices:

    - slug: qemuarm64
      description: "QEMU ARM64 (emulated)"
      vendor: qemu
      soc_vendor: arm
      includes:
        - kas/devices/qemu/qemuarm64.yaml

    - slug: qemuarm
      description: "QEMU ARM (32-bit, emulated)"
      vendor: qemu
      soc_vendor: arm
      includes:
        - kas/devices/qemu/qemuarm.yaml

    - slug: qemux86-64
      description: "QEMU x86-64 (emulated)"
      vendor: qemu
      soc_vendor: intel
      includes:
        - kas/devices/qemu/qemux86-64.yaml
  
    # Isar project uses qemuamd64 as the name for the x86-64 QEMU machine
    - slug: qemuamd64
      description: "QEMU AMD64 (X86-64) (emulated)"
      vendor: qemu
      soc_vendor: amd
      includes:
        - kas/devices/qemu/qemuamd64.yaml

  # =====================================
  # Build System Frameworks
  # (e.g. Yocto, Isar)
  # =====================================
  
  frameworks:

    - slug: yocto
      description: | 
        Yocto Project build system
      vendor: "Yocto Project"
      includes:
        - kas/yocto/yocto.yaml

    - slug: isar
      description: | 
        Set of scripts for building software packages and repeatable 
        generation of Debian-based root filesystems with customizations
      vendor: "Ilbers GmbH"
      includes:
        - kas/isar/isar.yaml

  # =====================================
  # Distributions
  # =====================================

  distro:
    
    - slug: poky
      description: "Poky (Yocto Project reference distro)"
      framework: yocto
      includes:
        - kas/yocto/distro/poky.yaml

    - slug: poky-harden
      description: "Hardened Poky (Yocto Project reference distro)"
      framework: yocto
      includes:
        - kas/yocto/distro/harden.yaml

    - slug: isar
      description: "Isar v0.11 (Siemens build system)"
      framework: isar
      includes:
        - kas/isar/isar-v0.11.yaml

  # =====================================
  # Releases
  # =====================================

  releases:

    - slug: scarthgap
      distro: poky
      description: "Yocto 5.0 LTS (Scarthgap)"
      yocto_version: "5.0"
      includes:
        - kas/yocto/releases/scarthgap.yaml

    - slug: scarthgap-harden
      distro: poky-harden
      description: "Yocto 5.0 LTS (Scarthgap Hardened)"
      yocto_version: "5.0"
      includes:
        - kas/yocto/releases/scarthgap.yaml

    - slug: styhead
      distro: poky
      description: "Yocto 5.1 (Styhead)"
      yocto_version: "5.1"
      includes:
        - kas/yocto/releases/styhead.yaml

    # Isar v0.11 – uses the isar-build named environment (Debian container + isar download cache)
    - slug: ubuntu-noble
      distro: isar
      description: "Ubuntu Noble (Isar)"
      isar_version: "0.11"
      environment: isar-build
      includes:
        - kas/isar/distro/ubuntu-noble.yaml

    - slug: debian-trixie
      distro: isar
      description: "Debian Trixie (Isar)"
      isar_version: "0.11"
      environment: isar-build
      includes:
        - kas/isar/distro/debian-trixie.yaml

  # =====================================
  # Features (optional add-ons)
  # =====================================

  features: 
  
    - slug: users
      description: "Add sample non-root user accounts to the image"
      compatible_with: [isar]   # This feature is only compatible with the Isar framework
      includes:
        - kas/isar/features/users.yaml

    - slug: systemd
      description: "Enable systemd as the init system"
      compatible_with: [yocto]   # This feature is only compatible with the Yocto framework
      includes:
        - kas/yocto/features/systemd.yaml

    - slug: yocto-ssh
      description: "Enable SSH server in the Yocto image"
      compatible_with: [yocto]   # This feature is only compatible with the Yocto framework
      includes:
        - kas/yocto/features/ssh.yaml

    - slug: isar-ssh
      description: "Enable SSH server in the Isar image"
      compatible_with: [isar]   # This feature is only compatible with the Isar framework
      includes:
        - kas/isar/features/ssh.yaml

    - slug: wic
      description: "Enable WIC image creation in the Isar image"
      compatible_with: [isar]   # This feature is only compatible with the Isar framework
      includes:
        - kas/isar/features/wic.yaml

    - slug: debug
      description: "Enable debug features in the image"
      compatible_with: [yocto]   # This feature is only compatible with the Yocto framework
      includes:
        - kas/yocto/features/debug.yaml

    - slug: security
      description: "Enable security features in the Yocto image"
      compatible_with: [yocto]   # This feature is only compatible with the Yocto framework
      includes:
        - kas/yocto/features/security.yaml

  # =====================================
  # BSP Presets (named shortcuts)
  # =====================================

  bsp:

    # --- QEMU ARM64 ---
    - name: poky-qemuarm64-scarthgap
      description: "Poky QEMU ARM64 Scarthgap (Yocto 5.0 LTS)"
      device: qemuarm64
      release: scarthgap
      features: [systemd, debug, yocto-ssh]

    - name: poky-qemuarm64-styhead
      description: "Poky QEMU ARM64 Styhead (Yocto 5.1)"
      device: qemuarm64
      release: styhead
      features: [systemd]
      build:  
        container: "debian-bookworm"
        path: build/poky-qemuarm64-styhead

    # --- QEMU x86-64 ---
    - name: poky-harden-qemux86-64-scarthgap
      description: "Poky Hardened QEMU x86-64 Scarthgap (Yocto 5.0 LTS)"
      device: qemux86-64
      release: scarthgap-harden
      features: [systemd, yocto-ssh, security]
      build:
        container: "debian-bookworm"
        path: build/poky-harden-qemux86-64-scarthgap

    - name: poky-qemux86-64-scarthgap
      description: "Poky QEMU x86-64 Scarthgap (Yocto 5.0 LTS)"
      device: qemux86-64
      release: scarthgap
      features: [systemd, debug, yocto-ssh]
      build:
        container: "debian-bookworm"
        path: build/poky-qemux86-64-scarthgap

    - name: poky-qemux86-64-styhead
      description: "Poky QEMU x86-64 Styhead (Yocto 5.1)"
      device: qemux86-64
      release: styhead
      features: [systemd]
      build:
        container: "debian-bookworm"
        path: build/poky-qemux86-64-styhead

    # --- QEMU ARM (32-bit) ---
    - name: poky-qemuarm-scarthgap
      description: "Poky QEMU ARM (32-bit) Scarthgap (Yocto 5.0 LTS)"
      device: qemuarm
      release: scarthgap
      features: [systemd]
      build:
        container: "debian-bookworm"
        path: build/poky-qemuarm-scarthgap

    # --- QEMU ARM64 Isar ---
    - name: isar-qemuarm64-ubuntu-noble
      description: "Isar v0.11 QEMU ARM64"
      device: qemuarm64
      release: ubuntu-noble
      features: [users, wic, isar-ssh]
      build:
        container: "isar-debian-trixie"
        path: build/isar-qemuarm64-ubuntu-noble

    # --- QEMU X86-64 Isar ---
    - name: isar-ubuntu-qemux86-64
      description: "Isar v0.11 QEMU x86-64 (Ubuntu Noble)"
      device: qemuamd64
      release: ubuntu-noble
      features: [users, wic, isar-ssh]
      build:
        container: "isar-debian-trixie"
        path: build/isar-ubuntu-qemux86-64

    - name: isar-debian-qemux86-64
      description: "Isar v0.11 QEMU x86-64 (Debian Trixie)"
      device: qemuamd64
      release: debian-trixie
      features: [users, wic, isar-ssh]
      build:
        container: "isar-debian-trixie"
        path: build/isar-debian-qemux86-64

    - name: isar-qemuarm64-debian-trixie
      description: "Isar v0.11 QEMU ARM64 (Debian Trixie)"
      device: qemuarm64
      release: debian-trixie
      features: [users, wic, isar-ssh]
      build:
        container: "isar-debian-trixie"
        path: build/isar-qemuarm64-debian-trixie
