specification:
  version: "2.0"

# Global environment variables for all builds (base layer – applied to every build)
# Use $ENV{VAR_NAME} syntax to reference system environment variables
environment:
  - name: "GITCONFIG_FILE"
    value: "$ENV{HOME}/.gitconfig"

# Named environments: each entry bundles a container reference + variables.
# The special name "default" is used for any release that does not specify an environment.
# A release can override by setting its "environment:" field to a different name.
environments:
  default:
    container: debian-bookworm
    variables:
      - name: "DL_DIR"
        value: "$ENV{HOME}/data/cache/downloads"
      - name: "SSTATE_DIR"
        value: "$ENV{HOME}/data/cache/sstate"

  # Isar uses its own Debian-based build system – point to a dedicated container
  isar-build:
    container: debian-trixie-isar
    variables:
      - name: "DL_DIR"
        value: "$ENV{HOME}/data/cache/isar/downloads"
      - name: "SSTATE_DIR"
        value: "$ENV{HOME}/data/cache/isar/sstate"

# Container definitions for build environments
containers:
  - debian-bookworm:
      image: "bsp/registry/debian/kas:5.2"
      file: Dockerfile.poky.debian
      args:
        - name: "DISTRO"
          value: "debian-bookworm"
        - name: "KAS_VERSION"
          value: "5.2"
  - debian-trixie-isar:
      image: "bsp/registry/debian/isar/kas:5.2"
      file: Dockerfile.isar.debian
      privileged: true    # Run container in privileged mode (required for ISAR builds)
      args:
        - name: "DISTRO"
          value: "debian-trixie"
        - name: "KAS_VERSION"
          value: "5.2"

registry:

  # =====================================
  # Devices
  # =====================================

  devices:

    - slug: qemuarm64
      description: "QEMU ARM64 (emulated)"
      vendor: qemu
      soc_vendor: arm
      build:
        container: "debian-bookworm"
        path: build/qemu-arm64
        includes:
          - kas/poky/qemu/qemuarm64.yaml

    - slug: qemuarm
      description: "QEMU ARM (32-bit, emulated)"
      vendor: qemu
      soc_vendor: arm
      build:
        container: "debian-bookworm"
        path: build/qemu-arm
        includes:
          - kas/poky/qemu/qemuarm.yaml

    - slug: qemux86-64
      description: "QEMU x86-64 (emulated)"
      vendor: qemu
      soc_vendor: intel
      build:
        container: "debian-bookworm"
        path: build/qemux86-64
        includes:
          - kas/poky/qemu/qemux86-64.yaml

    # Isar QEMU ARM64 – uses the isar-build environment (set at release level)
    - slug: qemuarm64-isar
      description: "QEMU ARM64 (Isar / Debian-based)"
      vendor: qemu
      soc_vendor: arm
      build:
        path: build/isar-qemu-arm64
        includes:
          - kas/isar/qemu/qemuarm64.yaml

    # Isar QEMU x86-64 – uses the isar-build environment (set at release level)
    - slug: qemux86-64-isar
      description: "QEMU x86-64 (Isar / Debian-based)"
      vendor: qemu
      soc_vendor: intel
      build:
        path: build/isar-qemux86-64
        includes:
          - kas/isar/qemu/qemux86-64.yaml

  # =====================================
  # Releases
  # =====================================

  releases:

    - slug: scarthgap
      description: "Yocto 5.0 LTS (Scarthgap)"
      yocto_version: "5.0"
      includes:
        - kas/poky/scarthgap.yaml

    - slug: styhead
      description: "Yocto 5.1 (Styhead)"
      yocto_version: "5.1"
      includes:
        - kas/poky/styhead.yaml

    # Isar v0.11 – uses the isar-build named environment (Debian container + isar download cache)
    - slug: ubuntu-noble
      description: "Ubuntu Noble (Isar v0.11)"
      isar_version: "0.11"
      environment: isar-build
      includes:
        - kas/isar/distro/ubuntu-noble.yaml

    - slug: debian-trixie-isar
      description: "Debian Trixie (Isar v0.11)"
      isar_version: "0.11"
      environment: isar-build
      includes:
        - kas/isar/distro/debian-trixie.yaml

  # =====================================
  # Features (optional add-ons)
  # =====================================

  features: []

  # =====================================
  # BSP Presets (named shortcuts)
  # =====================================

  bsp:

    # --- QEMU ARM64 ---
    - name: poky-qemuarm64-scarthgap
      description: "Poky QEMU ARM64 Scarthgap (Yocto 5.0 LTS)"
      device: qemuarm64
      release: scarthgap
      features: []

    - name: poky-qemuarm64-styhead
      description: "Poky QEMU ARM64 Styhead (Yocto 5.1)"
      device: qemuarm64
      release: styhead
      features: []

    # --- QEMU x86-64 ---
    - name: poky-qemux86-64-scarthgap
      description: "Poky QEMU x86-64 Scarthgap (Yocto 5.0 LTS)"
      device: qemux86-64
      release: scarthgap
      features: []

    - name: poky-qemux86-64-styhead
      description: "Poky QEMU x86-64 Styhead (Yocto 5.1)"
      device: qemux86-64
      release: styhead
      features: []

    # --- QEMU ARM (32-bit) ---
    - name: poky-qemuarm-scarthgap
      description: "Poky QEMU ARM (32-bit) Scarthgap (Yocto 5.0 LTS)"
      device: qemuarm
      release: scarthgap
      features: []

    # --- QEMU ARM64 Isar ---
    - name: isar-qemuarm64-v0.11
      description: "Isar v0.11 QEMU ARM64"
      device: qemuarm64-isar
      release: ubuntu-noble
      features: []

    # --- QEMU X86-64 Isar ---
    - name: isar-qemux86-64-v0.11
      description: "Isar v0.11 QEMU x86-64 (Ubuntu Noble)"
      device: qemux86-64-isar
      release: ubuntu-noble
      features: []

    - name: isar-qemux86-64-debian-trixie-v0.11
      description: "Isar v0.11 QEMU x86-64 (Debian Trixie)"
      device: qemux86-64-isar
      release: debian-trixie-isar
      features: []

    - name: isar-qemuarm64-debian-trixie-v0.11
      description: "Isar v0.11 QEMU ARM64 (Debian Trixie)"
      device: qemuarm64-isar
      release: debian-trixie-isar
      features: []
