specification:
  version: "2.0"

# Global environment variables for all builds
# Use $ENV{VAR_NAME} syntax to reference system environment variables
environment:
  - name: "GITCONFIG_FILE"
    value: "$ENV{HOME}/.gitconfig"
  - name: "DL_DIR"
    value: "$ENV{HOME}/data/cache/downloads"
  - name: "SSTATE_DIR"
    value: "$ENV{HOME}/data/cache/sstate"

# Container definitions for build environments
containers:
  - debian-bookworm:
      image: "bsp/registry/debian/kas:5.2"
      file: Dockerfile.poky.debian
      args:
        - name: "DISTRO"
          value: "debian-bookworm"
        - name: "KAS_VERSION"
          value: "5.2"
  - isar-debian-trixie:
      image: "bsp/registry/debian/isar/kas:5.2"
      file: Dockerfile.isar.debian
      privileged: true    # Run container in privileged mode (required for ISAR builds)
      args:
        - name: "DISTRO"
          value: "debian-trixie"
        - name: "KAS_VERSION"
          value: "5.2"

registry:
  # =====================================
  # Hardware Devices
  # =====================================
  devices:
    - slug: qemu-arm64
      description: "QEMU ARM64 (emulated)"
      vendor: qemu
      soc_vendor: arm
      build:
        path: build/qemu-arm64
        container: "debian-bookworm"
        includes:
          - kas/poky/qemu/qemuarm64.yaml

    - slug: qemu-x86-64
      description: "QEMU x86-64 (emulated)"
      vendor: qemu
      soc_vendor: intel
      build:
        path: build/qemu-x86-64
        container: "debian-bookworm"
        includes:
          - kas/poky/qemu/qemux86-64.yaml

    - slug: qemu-arm
      description: "QEMU ARM 32-bit (emulated)"
      vendor: qemu
      soc_vendor: arm
      build:
        path: build/qemu-arm
        container: "debian-bookworm"
        includes:
          - kas/poky/qemu/qemuarm.yaml

    - slug: qemu-arm64-isar
      description: "QEMU ARM64 for Isar (emulated)"
      vendor: qemu
      soc_vendor: arm
      build:
        path: build/qemu-arm64-isar
        container: "isar-debian-trixie"
        includes:
          - kas/isar/qemu/common.yaml
          - kas/isar/qemu/qemuarm64.yaml

    - slug: qemu-x86-64-isar
      description: "QEMU x86-64 for Isar (emulated)"
      vendor: qemu
      soc_vendor: intel
      build:
        path: build/qemu-x86-64-isar
        container: "isar-debian-trixie"
        includes:
          - kas/isar/qemu/common.yaml
          - kas/isar/qemu/qemux86-64.yaml

  # =====================================
  # Releases
  # =====================================
  releases:
    - slug: scarthgap
      description: "Scarthgap (Yocto 5.0 LTS)"
      yocto_version: "5.0"
      includes:
        - kas/poky/scarthgap.yaml

    - slug: styhead
      description: "Styhead (Yocto 5.1)"
      yocto_version: "5.1"
      includes:
        - kas/poky/styhead.yaml

    - slug: isar-debian-trixie
      description: "Isar with Debian Trixie"
      isar_version: "0.11"
      includes:
        - kas/isar/isar.yaml
        - kas/isar/distro/debian-trixie.yaml

    - slug: isar-ubuntu-noble
      description: "Isar with Ubuntu Noble"
      isar_version: "0.11"
      includes:
        - kas/isar/isar.yaml
        - kas/isar/distro/ubuntu-noble.yaml

  # =====================================
  # BSP Presets (shortcuts)
  # =====================================
  bsp:
    # Poky QEMU ARM64 BSPs
    - name: poky-qemuarm64-scarthgap
      description: "Poky QEMU ARM64 Scarthgap (Yocto 5.0 LTS)"
      device: qemu-arm64
      release: scarthgap

    - name: poky-qemuarm64-styhead
      description: "Poky QEMU ARM64 Styhead (Yocto 5.1)"
      device: qemu-arm64
      release: styhead

    # Poky QEMU x86-64 BSPs
    - name: poky-qemux86-64-scarthgap
      description: "Poky QEMU x86-64 Scarthgap (Yocto 5.0 LTS)"
      device: qemu-x86-64
      release: scarthgap

    - name: poky-qemux86-64-styhead
      description: "Poky QEMU x86-64 Styhead (Yocto 5.1)"
      device: qemu-x86-64
      release: styhead

    # Poky QEMU ARM (32-bit) BSPs
    - name: poky-qemuarm-scarthgap
      description: "Poky QEMU ARM (32-bit) Scarthgap (Yocto 5.0 LTS)"
      device: qemu-arm
      release: scarthgap

    # Isar QEMU BSPs
    - name: isar-qemuarm64-debian-trixie
      description: "Isar QEMU ARM64 Debian Trixie"
      device: qemu-arm64-isar
      release: isar-debian-trixie

    - name: isar-qemux86-64-debian-trixie
      description: "Isar QEMU x86-64 Debian Trixie"
      device: qemu-x86-64-isar
      release: isar-debian-trixie

    - name: isar-qemux86-64-ubuntu-noble
      description: "Isar QEMU x86-64 Ubuntu Noble"
      device: qemu-x86-64-isar
      release: isar-ubuntu-noble
