  <text x="510" y="554" font-size="11"><tspan>🐧 </tspan><tspan font-weight="bold" fill="#cdd6f4">fitImage-5.15.72+git0</tspan><tspan class="dim">  22.1 MB  2025-03-25 14:30</tspan></text>

