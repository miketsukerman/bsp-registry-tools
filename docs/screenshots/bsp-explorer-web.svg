  <text x="520" y="419" font-size="11"><tspan class="dim">DISTRO</tspan><tspan class="val"> = poky</tspan></text>
  <text x="520" y="435" font-size="11"><tspan class="dim">KAS_BUILD_DIR</tspan><tspan class="val"> = /work/build</tspan></text>
  <text x="520" y="451" class="dim">SSTATE_DIR = /work/sstate-cache</text>
