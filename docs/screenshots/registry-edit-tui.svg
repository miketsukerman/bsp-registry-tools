<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" style="background:#1e1e2e;font-family:'Fira Code',Consolas,monospace;">
  <defs>
    <style>
      text { font-family: 'Fira Code', Consolas, monospace; fill: #cdd6f4; }
      .title { font-size:14px; font-weight:bold; fill:#cba6f7; }
      .header { font-size:13px; fill:#89dceb; }
      .key { font-size:11px; fill:#89b4fa; font-weight:bold; }
      .val { font-size:11px; fill:#cdd6f4; }
      .dim { font-size:11px; fill:#6c7086; }
      .green { font-size:11px; fill:#a6e3a1; }
      .yellow { font-size:11px; fill:#f9e2af; }
      .red { font-size:11px; fill:#f38ba8; }
      .border { fill:none; stroke:#313244; stroke-width:1; }
      .primary-border { fill:none; stroke:#89b4fa; stroke-width:1; }
      .section-label { font-size:11px; fill:#89b4fa; font-weight:bold; }
      .action-btn { font-size:11px; fill:#a6e3a1; }
      .action-btn-warn { font-size:11px; fill:#f9e2af; }
      .action-btn-err { font-size:11px; fill:#f38ba8; }
      .input-box { fill:#313244; stroke:#585b70; stroke-width:1; }
      .input-active { fill:#313244; stroke:#89b4fa; stroke-width:1.5; }
      .modal-bg { fill:#181825; stroke:#cba6f7; stroke-width:1.5; }
      .modal-title { font-size:13px; font-weight:bold; fill:#cba6f7; }
      .label { font-size:11px; fill:#89b4fa; }
      .badge-ok { font-size:10px; fill:#a6e3a1; }
      .badge-err { font-size:10px; fill:#f38ba8; }
    </style>
  </defs>

  <!-- ─── Background app (dimmed) ─────────────────────────────────── -->

  <!-- Header bar -->
  <rect x="0" y="0" width="1200" height="32" fill="#313244" opacity="0.5"/>
  <text x="600" y="20" text-anchor="middle" class="title" opacity="0.5">BSP Registry Explorer</text>

  <!-- Registry bar -->
  <rect x="0" y="32" width="1200" height="28" fill="#181825" opacity="0.5"/>
  <text x="10" y="50" class="dim" font-size="11" opacity="0.5">Registry: /home/user/projects/my-bsp/bsp-registry.yaml</text>

  <!-- Dimmed left panel -->
  <rect x="5" y="65" width="460" height="700" rx="3" fill="#181825" stroke="#313244" stroke-width="1" opacity="0.4"/>
  <text x="15" y="83" class="section-label" opacity="0.4">BSP Presets</text>
  <text x="25" y="128" class="dim" opacity="0.4">  ▼ QEMU</text>
  <text x="35" y="144" class="dim" opacity="0.4">    ▼ QEMU ARM64 (emulated)</text>
  <text x="45" y="160" class="dim" opacity="0.4">      ▼ Yocto 5.0 LTS (Scarthgap)</text>
  <rect x="50" y="165" width="405" height="16" rx="1" fill="#313244" opacity="0.3"/>
  <text x="55" y="177" class="green" opacity="0.4" font-weight="bold">        poky-qemuarm64-scarthgap</text>

  <!-- Dimmed right panel -->
  <rect x="470" y="65" width="725" height="610" rx="3" fill="#181825" stroke="#313244" stroke-width="1" opacity="0.4"/>
  <text x="480" y="83" class="section-label" opacity="0.4">BSP Details</text>

  <!-- ─── EditPanel modal overlay ──────────────────────────────────── -->
  <!-- Scrim -->
  <rect x="0" y="0" width="1200" height="800" fill="#000000" opacity="0.55"/>

  <!-- Modal card -->
  <rect x="200" y="60" width="800" height="660" rx="6" class="modal-bg"/>

  <!-- Modal title bar -->
  <rect x="200" y="60" width="800" height="36" rx="6" fill="#313244"/>
  <rect x="200" y="78" width="800" height="18" fill="#313244"/>
  <text x="600" y="84" text-anchor="middle" class="modal-title">✏  Edit Preset — poky-qemuarm64-scarthgap</text>

  <!-- Validation banner (no errors) -->
  <rect x="210" y="102" width="780" height="22" rx="3" fill="#1e3a2e" stroke="#a6e3a1" stroke-width="1"/>
  <text x="220" y="117" class="badge-ok">✓  No validation errors</text>

  <!-- ── Form fields ── -->

  <!-- Name / slug -->
  <text x="216" y="144" class="label">Name</text>
  <rect x="216" y="148" width="770" height="24" rx="3" class="input-box"/>
  <text x="222" y="165" class="val">poky-qemuarm64-scarthgap</text>

  <!-- Description -->
  <text x="216" y="192" class="label">Description</text>
  <rect x="216" y="196" width="770" height="24" rx="3" class="input-active"/>
  <text x="222" y="213" class="val">Yocto Poky for QEMU ARM64 (Scarthgap)</text>
  <!-- cursor blink -->
  <rect x="594" y="200" width="2" height="15" fill="#cdd6f4"/>

  <!-- Device (dropdown-style) -->
  <text x="216" y="240" class="label">Device</text>
  <rect x="216" y="244" width="370" height="24" rx="3" class="input-box"/>
  <text x="222" y="261" class="val">qemuarm64</text>
  <text x="573" y="261" class="dim">▼</text>

  <!-- Release (dropdown-style) -->
  <text x="600" y="240" class="label">Release</text>
  <rect x="600" y="244" width="386" height="24" rx="3" class="input-box"/>
  <text x="606" y="261" class="val">scarthgap</text>
  <text x="973" y="261" class="dim">▼</text>

  <!-- Features list -->
  <text x="216" y="290" class="label">Features  <tspan class="dim">(+ to add  − to remove)</tspan></text>
  <rect x="216" y="294" width="770" height="56" rx="3" fill="#313244" stroke="#585b70" stroke-width="1"/>
  <!-- feature chips -->
  <rect x="224" y="302" width="60" height="18" rx="9" fill="#1e3a5c" stroke="#89b4fa" stroke-width="1"/>
  <text x="254" y="315" text-anchor="middle" font-size="10" fill="#89b4fa">poky</text>
  <rect x="292" y="302" width="56" height="18" rx="9" fill="#1e3a5c" stroke="#89b4fa" stroke-width="1"/>
  <text x="320" y="315" text-anchor="middle" font-size="10" fill="#89b4fa">qemu</text>
  <rect x="356" y="302" width="66" height="18" rx="9" fill="#1e3a5c" stroke="#89b4fa" stroke-width="1"/>
  <text x="389" y="315" text-anchor="middle" font-size="10" fill="#89b4fa">arm64</text>
  <rect x="746" y="302" width="30" height="18" rx="3" fill="#313244" stroke="#a6e3a1" stroke-width="1"/>
  <text x="761" y="315" text-anchor="middle" font-size="12" fill="#a6e3a1">+</text>
  <rect x="782" y="302" width="30" height="18" rx="3" fill="#313244" stroke="#f38ba8" stroke-width="1"/>
  <text x="797" y="315" text-anchor="middle" font-size="12" fill="#f38ba8">−</text>

  <!-- Build container -->
  <text x="216" y="372" class="label">Build Container</text>
  <rect x="216" y="376" width="370" height="24" rx="3" class="input-box"/>
  <text x="222" y="393" class="val">debian-bookworm</text>
  <text x="573" y="393" class="dim">▼</text>

  <!-- Build path -->
  <text x="600" y="372" class="label">Build Path  <tspan class="dim">(optional)</tspan></text>
  <rect x="600" y="376" width="386" height="24" rx="3" class="input-box"/>
  <text x="606" y="393" class="val">build/poky-qemuarm64-scarthgap</text>

  <!-- local_conf textarea label -->
  <text x="216" y="422" class="label">Extra local.conf  <tspan class="dim">(one entry per line)</tspan></text>
  <rect x="216" y="426" width="770" height="80" rx="3" fill="#313244" stroke="#585b70" stroke-width="1"/>
  <text x="222" y="442" class="dim">MACHINE_FEATURES += "efi"</text>
  <text x="222" y="458" class="dim">IMAGE_INSTALL:append = " python3"</text>

  <!-- Undo hint -->
  <text x="216" y="530" class="dim">Changes held in memory — not yet saved to disk.  Undo stack depth: 2</text>

  <!-- Divider -->
  <line x1="210" y1="540" x2="990" y2="540" stroke="#313244" stroke-width="1"/>

  <!-- Action buttons -->
  <!-- Save -->
  <rect x="216" y="550" width="100" height="30" rx="4" fill="#1e3a2e" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="266" y="570" text-anchor="middle" class="action-btn" font-size="12">💾 Save</text>

  <!-- Undo -->
  <rect x="328" y="550" width="100" height="30" rx="4" fill="#1e2a3a" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="378" y="570" text-anchor="middle" font-size="12" fill="#89b4fa">↩ Undo</text>

  <!-- Discard -->
  <rect x="440" y="550" width="100" height="30" rx="4" fill="#3a1e1e" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="490" y="570" text-anchor="middle" class="action-btn-err" font-size="12">✕ Discard</text>

  <!-- Close -->
  <rect x="870" y="550" width="110" height="30" rx="4" fill="#313244" stroke="#585b70" stroke-width="1"/>
  <text x="925" y="570" text-anchor="middle" class="dim" font-size="12">✕ Close  [Esc]</text>

  <!-- ── Diff section ── -->
  <line x1="210" y1="596" x2="990" y2="596" stroke="#313244" stroke-width="1"/>
  <text x="216" y="614" class="label">Diff (in-memory vs on-disk)</text>

  <rect x="216" y="620" width="770" height="88" rx="3" fill="#11111b" stroke="#313244" stroke-width="1"/>
  <text x="222" y="636" font-size="10" fill="#6c7086">@@ -5,3 +5,3 @@</text>
  <text x="222" y="652" font-size="10" fill="#6c7086"> name: poky-qemuarm64-scarthgap</text>
  <text x="222" y="668" font-size="10" fill="#f38ba8">-description: Yocto Poky for QEMU ARM64 Scarthgap</text>
  <text x="222" y="684" font-size="10" fill="#a6e3a1">+description: Yocto Poky for QEMU ARM64 (Scarthgap)</text>
  <text x="222" y="700" font-size="10" fill="#6c7086"> device: qemuarm64</text>

  <!-- ─── Footer ──────────────────────────────────────────────────── -->
  <rect x="0" y="784" width="1200" height="16" fill="#11111b"/>
  <text x="10" y="796" class="dim" font-size="9">Ctrl+E Edit  a Add  d Remove  Ctrl+D Diff  q Quit  r Refresh  b Build  s Shell  f Flash</text>
</svg>
